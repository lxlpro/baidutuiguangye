<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有道领世教育 - 网易有道旗下高中课程品牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.7;
            /* background: linear-gradient(180deg, #E8EFFF 0%, #F5F7FF 100%); */
            background-color: #dce0ff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .container .common-bg {
            height: calc(100% - 40px);
            min-height: 700px;
            position: absolute;
            background-color: #94a1ff;
            width: calc(100% - 40px);
            z-index: -1;
        }
        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, #8BA4E8 0%, #A8BFEF 100%);
            padding: 60px 0 80px;
            position: relative;
            overflow: hidden;
        }
        
        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }
        
        .hero-text {
            flex: 1;
        }
        
        .hero-badge {
            background: #5B7BC9;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .hero-title {
            font-size: 56px;
            font-weight: 700;
            color: #2D4A9E;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .hero-subtitle {
            font-size: 16px;
            color: #5B7BC9;
            line-height: 1.8;
        }
        
        .hero-image {
            flex: 0 0 400px;
            text-align: right;
        }
        
        .hero-image img {
            max-width: 100%;
            height: auto;
        }
        
        /* Course Selection Section */
        .course-selection {
            background: white;
            padding: 50px 40px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            margin-top: 80px;
            border-top-left-radius: 5%;
        }
        
        .grade-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .grade-tab {
            background: #404ebb;
            color: white;
            padding: 12px 40px;
            border-radius: 10px;
            font-size: 30px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            padding:10px 60px;
        }
        
        .grade-tab:hover {
            background: #4A6AB8;
            transform: translateY(-2px);
        }
        
        .subject-tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .subject-tab {
            color: #94a1ff;
            font-size: 30px;
            cursor: pointer;
            transition: color 0.3s;
            background-color: #eceeff;
            min-width: 200px;
            text-align: center;
        }
        
        .subject-tab:hover {
            color: #5B7BC9;
        }
        
        .course-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
        }
        
        .course-image {
            width: 100%;
            height: 380px;
            background: #F0F4FF;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .course-image img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .course-badge {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(91, 123, 201, 0.95);
            color: white;
            padding: 8px 30px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .course-badge.highlight {
            background: linear-gradient(90deg, #FF9D4A 0%, #FF7B1F 100%);
        }
        
        .course-info {
            padding: 20px;
        }
        
        .course-label {
            color: #404ebb;
            font-size: 30px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .course-description {
            color: #404ebb;
            font-size: 25px;
            line-height: 1.6;
        }
        
        .course-cta {
            background: linear-gradient(90deg, #FF9D4A 0%, #FF7B1F 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s;
        }
        
        .course-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 125, 31, 0.3);
        }
        
        /* Teacher Section */
        .teacher-section {
            background: white;
            border-top-right-radius: 5%;
            padding: 60px 40px;
            margin: 40px auto;
            max-width: 1400px;
            margin-top: 80px;
        }
        
        .section-title {
            letter-spacing: 3px;
            text-align: center;
            font-size: 60px;
            font-weight: 700;
            color: #404ebb;
            margin-bottom: 15px;
        }
        
        .section-subtitle {
            text-align: center;
            color: #394754;
            font-size: 40px;
            margin-bottom: 40px;
            letter-spacing: 11px;
        }
        
        .teacher-image {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: block;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .cta-button {
            background: linear-gradient(90deg, #FF9D4A 0%, #FF7B1F 100%);
            color: white;
            border: none;
            padding: 12px 60px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            display: block;
            margin: 40px auto 0;
            transition: all 0.3s;
            width: 40%;
        }
        
        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 125, 31, 0.3);
        }
        
        /* Features Section */
        .features-section {
            background: white;
            border-top-left-radius: 5%;
            padding: 60px 40px;
            margin: 40px auto;
            max-width: 1400px;
            margin-top: 80px;
        }
        
        .features-subtitle {
            text-align: center;
            color: #394754;
            font-size: 40px;
            margin-bottom: 40px;
            letter-spacing: 11px;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .feature-item {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .feature-icon {
            width: 120px;
            height: 120px;
            background: #F5F7FF;
            border-radius: 15px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .feature-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .feature-content {
            flex: 1;
        }
        
        .feature-title {
            font-size: 18px;
            font-weight: 600;
            color: #2D4A9E;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feature-icon-small {
            width: 24px;
            height: 24px;
            background: #FFB84D;
            border-radius: 50%;
        }
        
        .feature-description {
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }
        
        /* AI Section */
        .ai-section {
            background: white;
            border-top-right-radius: 5%;
            padding: 60px 40px;
            margin: 40px auto 80px;
            max-width: 1400px;
            margin-top: 80px;
        }
        
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .ai-card {
            background: #F8F9FF;
            border-radius: 15px;
            padding: 20px;
            min-height: 200px;
        }
        
        .ai-card-title {
            background: #E8EFFF;
            color: #5B7BC9;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 15px;
        }
        
        .ai-card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        
        .ai-card p {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }
            
            .hero-title {
                font-size: 36px;
            }
            
            .hero-image {
                flex: 0 0 auto;
                margin-top: 30px;
            }
            
            .course-cards,
            .features-grid,
            .ai-grid {
                grid-template-columns: 1fr;
            }
            
            .grade-tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section>
        <img src="./images/1.png" alt="学生形象" style="width: stretch;object-fit: fill;"/>
    </section>

    <!-- Course Selection Section -->
     <div style="margin-top: 60px;">
        <div class="container" style="position: relative;padding-top: 20px;">
            <!-- 背景 -->
            <div class="common-bg" style="border-top-left-radius: 5%;"></div>
            <section class="course-selection container">
                <div class="grade-tabs">
                    <button class="grade-tab">高中</button>
                    <button class="grade-tab">初中</button>
                    <button class="grade-tab">一对一</button>
                </div>
                
                <div class="subject-tabs">
                    <span class="subject-tab">数学</span>
                    <span class="subject-tab">语文</span>
                    <span class="subject-tab">外语</span>
                    <span class="subject-tab">英语</span>
                    <span class="subject-tab">历史</span>
                    <span class="subject-tab">物理</span>
                    <span class="subject-tab">地理</span>
                    <span class="subject-tab">化学</span>
                    <span class="subject-tab">生物</span>
                </div>
                
                <div class="course-cards">
                    <div>
                        <div class="course-card">
                            <div class="course-image">
                                <img src="./images/2.png" alt="初中1对1在线辅导" />
                            </div>
                        </div>
                        <div class="course-info">
                            <div class="course-label">课程特点：</div>
                            <div class="course-description">
                                根据各地必考点、易错点<br>同步学科辅导，提升各科成绩
                            </div>
                        </div>
                        <button class="course-cta">咨询课程</button>
                    </div>
                    <div>
                        <div class="course-card">
                            <div class="course-image">
                                <img src="./images/3.png" alt="高中在线辅导" />
                            </div>
                        </div>
                        <div class="course-info">
                            <div class="course-label">课程特点：</div>
                            <div class="course-description">
                                课前1V1学情诊断，了解孩子学习状态，课中清北牛师授课，课后学习&答疑
                            </div>
                        </div>
                        <button class="course-cta">咨询课程</button>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <!-- Teacher Section -->
    <div style="margin-top: 60px;">
        <div class="container" style="position: relative;padding-top: 20px;">
            <!-- 背景 -->
            <div class="common-bg" style="border-top-right-radius: 5%;"></div>
            <section class="teacher-section">
                <h2 class="section-title">有道领世网课　清北牛师天团</h2>
                <p class="section-subtitle">让 家 长 省 心 让 孩 子 高 效 逆 袭</p>
                <img src="./images/4.png" alt="教师团队" class="teacher-image" />
                <button class="cta-button">咨询课程</button>
            </section>
        </div>
    </div>
    <!-- Features Section -->
    <div style="margin-top: 60px;">
        <div class="container" style="position: relative;padding-top: 20px;">
            <!-- 背景 -->
            <div class="common-bg" style="border-top-left-radius: 5%;"></div>
            <section class="features-section">
                <h2 class="section-title">在家就能学　上课超省心</h2>
                <p class="features-subtitle">支持手机、iPad、电脑，随时随地听课</p>
                
                <div style="text-align: center;">
                    <img src="./images/5.png" style="object-fit: fill;width: 80%;">
                </div>
                
                <button class="cta-button">咨询课程</button>
            </section>
        </div>
    </div>
    <!-- AI Section -->
    <div style="margin-top: 60px;">
        <div class="container" style="position: relative;padding-top: 20px;">
            <!-- 背景 -->
            <div class="common-bg" style="border-top-right-radius: 5%;"></div>
            <section class="ai-section">
                <h2 class="section-title">AI智慧伴学</h2>
                <p class="section-subtitle">1对1定制学孩子成长的见证</p>
                
                <div style="text-align: center;">
                    <img src="./images/6.png" style="object-fit: fill;width: 80%;"
                </div>
                
                <button class="cta-button">咨询课程</button>
            </section>
        </div>
    </div>
</body>
</html>
