<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高途教育 - 高中全科在线网课</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .hero-left {
            flex: 1;
            color: white;
        }
        
        .hero-badge {
            background: white;
            color: #FF6B3D;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .hero-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .hero-features {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .hero-feature-tag {
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 16px;
            border-radius: 15px;
            font-size: 14px;
        }
        
        .hero-right {
            flex: 0 0 400px;
        }
        
        .hero-right img {
            width: 100%;
        }
        
        .nav-content {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 15px;
            color: #666;
        }
        
        .nav-item {
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .nav-item:hover {
            color: #FF6B3D;
        }
        
        /* Course Section */
        .course-section {
            background: #F8F9FA;
            padding: 60px 0;
        }
        
        .section-title {
            text-align: center;
            font-size: 50px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }
        
        .section-subtitle {
            text-align: center;
            font-size: 40px;
            color: #ff7b47;
            font-weight: 700;
            margin-bottom: 40px;
        }
        
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }
        
        .subject-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .subject-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .subject-icon {
            width: 48px;
            height: 48px;
            /* margin: 0 auto 10px; */
            margin-right: 20px;;
        }
        
        .subject-name {
            font-size: 30px;
            font-weight: 600;
            color:#ff7b47;
        }
        
        .course-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }
        
        .course-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
        }
        
        .course-image {
            width: 100%;
            height: 280px;
            position: relative;
        }
        
        .course-image img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
        
        .course-badge {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 61, 0.95);
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .course-info {
            padding: 25px;
        }
        
        .course-label {
            color: #FF6B3D;
            font-size: 25px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .course-description {
            color: #666;
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .course-cta {
            background: linear-gradient(90deg, #FF8C5A 0%, #FF6B3D 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        
        .course-cta:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 107, 61, 0.3);
        }
        
        /* Features Section */
        .features-section {
            background: white;
            padding: 60px 0;
        }
        
        .features-content {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        
        .features-image {
            flex: 0 0 500px;
        }
        
        .features-image img {
            width: 100%;
            border-radius: 16px;
        }
        
        .features-list {
            flex: 1;
        }
        
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .feature-icon {
            width: 48px;
            height: 48px;
            background: #FFF5F0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .feature-icon img {
            width: 28px;
            height: 28px;
        }
        
        .feature-content h3 {
            font-size: 18px;
            color: #FF6B3D;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .feature-content p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .features-cta {
            background: linear-gradient(90deg, #FF8C5A 0%, #FF6B3D 100%);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .features-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 61, 0.3);
        }
        
        /* Teacher Section */
        .teacher-section {
            background: #F8F9FA;
            padding: 60px 0;
        }
        
        .teacher-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .teacher-image {
            max-width: 600px;
            margin: 0 30px;
        }
        
        .teacher-image img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        .teacher-features {
            display: flex;
            justify-content: center;
            flex-direction: column;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .teacher-feature {
            color: #fc831c;
            font-size: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom:2px solid #e5e5e5;
        }
        
        .teacher-feature::before {
            content: "•";
            font-size: 20px;
        }
        
        .teacher-cta {
            background: linear-gradient(90deg, #FF8C5A 0%, #FF6B3D 100%);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
        }
        
        .teacher-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 61, 0.3);
        }
        
        /* AI Section */
        .ai-section {
            background: white;
            padding: 60px 0;
        }
        
        .ai-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 40px;
        }
        
        .ai-card {
            background: #F8F9FA;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }
        
        .ai-card-title {
            background: #FFF5F0;
            color: #FF6B3D;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .ai-card-image {
            width: 100%;
            margin-bottom: 15px;
        }
        
        .ai-card-image img {
            width: 100%;
            border-radius: 12px;
        }
        
        .ai-card-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .ai-cta {
            background: linear-gradient(90deg, #FF8C5A 0%, #FF6B3D 100%);
            color: white;
            border: none;
            padding: 14px 50px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.3s;
        }
        
        .ai-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 61, 0.3);
        }
        
        .cta-center {
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }
            
            .hero-right {
                flex: 0 0 auto;
                margin-top: 30px;
            }
            
            .subject-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .course-cards {
                grid-template-columns: 1fr;
            }
            
            .features-content {
                flex-direction: column;
            }
            
            .features-image {
                flex: 0 0 auto;
            }
            
            .ai-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
